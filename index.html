<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台大電機之夜 幸運抽獎</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-pink: #ff0080;
            --neon-cyan: #00ffff;
            --neon-purple: #b400ff;
            --neon-yellow: #ffff00;
            --neon-orange: #ff6600;
            --dark-bg: #0a0a0f;
            --card-bg: rgba(20, 20, 35, 0.85);
            --ntu-blue: #002984;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0033 100%);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 25s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(40px); }
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease-out;
        }

        .event-title {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--neon-cyan);
            font-weight: 700;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--neon-cyan);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px var(--neon-cyan)); }
            to { filter: drop-shadow(0 0 40px var(--neon-pink)); }
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: var(--card-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 20px 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 5px 25px rgba(0, 255, 255, 0.3);
            text-align: center;
            min-width: 150px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 0 0 15px var(--neon-yellow);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 255, 255, 0.2);
            animation: fadeInUp 1s ease-out;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 255, 0.08), transparent);
            transform: rotate(45deg);
            animation: shine 4s infinite;
        }

        @keyframes shine {
            0%, 100% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            50% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-pink);
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--neon-pink);
            position: relative;
            z-index: 1;
        }

        .prize-list {
            max-height: 500px;
            overflow-y: auto;
            position: relative;
            z-index: 1;
        }

        .prize-item {
            background: rgba(0, 0, 0, 0.4);
            border-left: 4px solid var(--neon-purple);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .prize-item:hover {
            background: rgba(180, 0, 255, 0.2);
            border-left-color: var(--neon-cyan);
            transform: translateX(5px);
        }

        .prize-item.selected {
            background: rgba(0, 255, 255, 0.2);
            border-left-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
        }

        .prize-item.completed {
            opacity: 0.5;
            border-left-color: #666;
        }

        .prize-name {
            font-weight: 700;
            font-size: 1rem;
            flex: 1;
        }

        .prize-count {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-yellow);
            font-size: 0.9rem;
            margin-left: 10px;
        }

        .winner-display-area {
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .current-prize-name {
            font-size: 1.5rem;
            color: var(--neon-orange);
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 15px var(--neon-orange);
        }

        .rolling {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--neon-yellow);
            text-shadow: 0 0 40px var(--neon-yellow);
            animation: pulse 0.5s infinite;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .winner {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            background: linear-gradient(45deg, var(--neon-yellow), var(--neon-pink), var(--neon-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: winnerAppear 1s ease-out, winnerGlow 2s ease-in-out infinite;
            margin: 20px 0;
            text-align: center;
        }

        @keyframes winnerAppear {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes winnerGlow {
            0%, 100% { filter: drop-shadow(0 0 30px var(--neon-yellow)); }
            50% { filter: drop-shadow(0 0 60px var(--neon-pink)); }
        }

        .btn {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            border: none;
            color: #fff;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
            box-shadow: 0 0 30px rgba(255, 0, 128, 0.6);
            letter-spacing: 2px;
            margin: 10px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .btn-warning {
            background: linear-gradient(45deg, var(--neon-orange), var(--neon-yellow));
            box-shadow: 0 0 30px rgba(255, 102, 0, 0.6);
        }

        .winner-history {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .winner-group {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--neon-cyan);
        }

        .winner-group-title {
            color: var(--neon-orange);
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .winner-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .winner-name {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .winner-number {
            color: var(--neon-pink);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.3rem;
            text-align: center;
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 9999;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .control-buttons {
            text-align: center;
            margin-top: 20px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-pink);
        }

        /* 彈出視窗 */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: relative;
            background: var(--card-bg);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            margin: 5% auto;
            padding: 30px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            animation: slideDown 0.3s;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close-modal {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-pink);
            cursor: pointer;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 0, 128, 0.1);
        }

        .close-modal:hover {
            transform: rotate(90deg);
            background: rgba(255, 0, 128, 0.3);
            box-shadow: 0 0 20px var(--neon-pink);
        }

        .modal h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            font-size: 2rem;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        .name-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .name-item {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border-left: 3px solid var(--neon-purple);
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .name-item:hover {
            background: rgba(180, 0, 255, 0.2);
            border-left-color: var(--neon-cyan);
            transform: translateY(-2px);
        }

        .name-item.won {
            opacity: 0.4;
            text-decoration: line-through;
            border-left-color: #666;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--neon-purple);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 700;
        }

        .filter-tab:hover {
            background: rgba(180, 0, 255, 0.3);
            border-color: var(--neon-cyan);
        }

        .filter-tab.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <canvas id="particles"></canvas>

    <div class="container">
        <header>
            <div class="event-title">台大電機之夜 2026</div>
            <h1>LUCKY DRAW</h1>
        </header>

        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-label">總參與人數</div>
                <div class="stat-value" id="totalParticipants">588</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">剩餘人數</div>
                <div class="stat-value" id="remainingParticipants">588</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">已抽獎項</div>
                <div class="stat-value" id="completedPrizes">0/9</div>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <button class="btn btn-secondary" onclick="showParticipantList()">📋 查看抽獎名單</button>
        </div>

        <div class="main-layout">
            <!-- 左側：獎品列表 -->
            <div class="card">
                <h2>獎品列表</h2>
                <div class="prize-list" id="prizeList"></div>
            </div>

            <!-- 右側：抽獎區域 -->
            <div class="card">
                <h2>抽獎結果</h2>
                <div class="winner-display-area" id="winnerDisplay">
                    <p class="placeholder-text">請選擇左側獎品開始抽獎</p>
                </div>
                <div class="control-buttons">
                    <button class="btn" onclick="startDraw()" id="drawBtn" disabled>開始抽獎</button>
                    <button class="btn btn-secondary" onclick="confirmWinner()" id="confirmBtn" disabled>確認中獎</button>
                    <button class="btn btn-warning" onclick="resetAll()">全部重置</button>
                </div>
            </div>
        </div>

        <!-- 中獎記錄 -->
        <div class="card">
            <h2>中獎記錄</h2>
            <div class="winner-history" id="winnerHistory">
                <p class="placeholder-text">尚無中獎記錄</p>
            </div>
        </div>
    </div>

    <!-- 名單彈出視窗 -->
    <div id="participantModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeParticipantList()">&times;</span>
            <h2>抽獎名單</h2>
            
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterList('all')">全部 (<span id="countAll">588</span>)</button>
                <button class="filter-tab" onclick="filterList('available')">可抽獎 (<span id="countAvailable">588</span>)</button>
                <button class="filter-tab" onclick="filterList('won')">已中獎 (<span id="countWon">0</span>)</button>
                <button class="filter-tab" onclick="filterList('audience')">觀眾編號 (<span id="countAudience">400</span>)</button>
                <button class="filter-tab" onclick="filterList('named')">具名參與者 (<span id="countNamed">188</span>)</button>
            </div>
            
            <div class="name-grid" id="nameGrid"></div>
        </div>
    </div>

    <script>
        // 粒子背景
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 80;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 2;
                this.color = Math.random() > 0.5 ? 'rgba(0, 255, 255, 0.4)' : 'rgba(255, 0, 128, 0.4)';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // 抽獎數據
        const PRIZES = [
            {id: 1, name: "Miss game 跳動格子單人免費券（每人2張）", quantity: 2, winnersPerDraw: 10, totalWinners: 10},
            {id: 2, name: "瑪琍歐保時捷遙控車", quantity: 1, winnersPerDraw: 1, totalWinners: 1},
            {id: 3, name: "旅行快煮壺", quantity: 2, winnersPerDraw: 2, totalWinners: 2},
            {id: 4, name: "米家調理機", quantity: 1, winnersPerDraw: 1, totalWinners: 1},
            {id: 5, name: "ADATA 無線磁吸式行動電源", quantity: 2, winnersPerDraw: 2, totalWinners: 2},
            {id: 6, name: "三麗鷗旅行掛扣帶", quantity: 50, winnersPerDraw: 50, totalWinners: 50},
            {id: 7, name: "味全龍智勝引退球衣手燈", quantity: 10, winnersPerDraw: 10, totalWinners: 10},
            {id: 8, name: "龍將心願斗方", quantity: 10, winnersPerDraw: 10, totalWinners: 10},
            {id: 9, name: "小龍女DB Show鑰匙圈（隨機不挑款）", quantity: 20, winnersPerDraw: 20, totalWinners: 20}
        ];

        // 參與者名單 - 觀眾001-400 + 試算表名單
        const AUDIENCE = Array.from({length: 400}, (_, i) => `觀眾${String(i + 1).padStart(3, '0')}`);
        const NAMED_PARTICIPANTS = ["丁燿東","任涵聿","何文璦","余侑宸","余宸翰","侯奕安","傅品翔","劉又慈","劉威廉","劉宣徹","劉家妤","劉庭瑋","劉書辰","劉欣琪","劉祐丞","吳亞倫","吳奕娃","吳孟峰","吳昀祐","吳柏均","吳秉宸","吳頴祈","呂依倢","呂季洋","周冠宇","安馬林","尉崴","岑冠逸","廖冠豪","廖浚宇","廖澤宇","張勝勛","張嘉元","張宸嘉","張維軒","張鄭立珩","張騏任","徐丞儀","徐啓惇","徐啟惇","徐子翔","徐立承","易楷騰","曹丞豐","曾奕翔","曾竹慧 ","朱小紅","李奕辰","李奕頡","李子安","李子平","李家陞","李康碩","李承百","李文琳","李易儒","李科雋","林丞康","林侑葶","林啟德","林奕侖","林子均","林家弘","林庭羽","林廣軒","林思翰","林櫻樺","林源熹","林炘翰","林玉軒","林禹安","林育正","林郁晴","林鈺軒","柯瀚鈞","梁勝宥","梅昊恩","楊尚儒","楊淑婷","楊淮宇","楊程亘","楊翔允","楊詠翔","歐穎榮","江履方","江昇祐","洪翊俊","游允赫 ","游凱翔","潘勁諺","潘葦軒","王宥翔","王彥智","田庭瑄","石晏禎","簡云凡","羅令幃","羅慶祐","羅景鴻","羅煒竣","胡軒綸","臧逸新","莊淳皓","葉冠廷","葉耕綸","董庭維","蔡尚麟","蔡忠達","蔡昀珊","蔡育紘","蕭鼎霖","薛珺文","藍可吉","蘇力威","蘇昱全","許思嫺","許楷翊","許睿恩","詹仲睿","詹易夫","詹翔允","謝意苹","謝承祐","謝皓宇","謝秉宸","謝秉洋","賴容恩","趙季涵","趙省樺","邱亭翔","邱敍庭","邱柏愷","郭宥均","郭彥謙","郭育熏","郭逸臣","鄧恩陞","鄭允迦","鄭勝宇","鄭宇涵","鄭安妤","鄭澄揚","鄭莆濬","金秉圻","鍾承芳","鍾昀恩","鐘政翔","阮豐翗","陳之勤","陳俞蓁","陳冠孜","陳冠宇","陳宥宇","陳宥漢","陳庭瑋","陳建宇","陳彥甫","陳彥霖","陳拓之","陳歆玟","陳永傑","陳泓安","陳煥宇","陳瑞霆","陳璿宇","陳立邦","陳竣瑋","陳胤亮","陳芊竹","陳諺德","陳郁玲","陳顗帆","雷克斯","韓裕民","顏子翔","顏瑅嬅","馮威榮","駱奕","高亮家","高瑞謙","高翊華","黃品叡","黃喆","黃奕軒","黃承傑","黃昱翔","黃郁涵","黃雅澤"];
        
        let ALL_PARTICIPANTS = [...AUDIENCE, ...NAMED_PARTICIPANTS];
        let availableParticipants = [...ALL_PARTICIPANTS];
        let allWinners = [];
        let currentPrize = null;
        let currentWinner = null;
        let isDrawing = false;
        let prizeProgress = {};

        // 初始化
        function init() {
            PRIZES.forEach(prize => {
                prizeProgress[prize.id] = {
                    drawn: 0,
                    winners: []
                };
            });
            renderPrizeList();
            updateStats();
        }

        function renderPrizeList() {
            const html = PRIZES.map(prize => {
                const progress = prizeProgress[prize.id];
                const completed = progress.drawn >= prize.totalWinners;
                return `
                    <div class="prize-item ${completed ? 'completed' : ''}" onclick="selectPrize(${prize.id})">
                        <div class="prize-name">${prize.name}</div>
                        <div class="prize-count">${progress.drawn}/${prize.totalWinners}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('prizeList').innerHTML = html;
        }

        function selectPrize(prizeId) {
            const prize = PRIZES.find(p => p.id === prizeId);
            const progress = prizeProgress[prizeId];
            
            if (progress.drawn >= prize.totalWinners) {
                showNotification('此獎項已抽完！', 'error');
                return;
            }

            currentPrize = prize;
            document.querySelectorAll('.prize-item').forEach(el => el.classList.remove('selected'));
            event.target.closest('.prize-item').classList.add('selected');
            
            document.getElementById('drawBtn').disabled = false;
            document.getElementById('winnerDisplay').innerHTML = `
                <div class="current-prize-name">${prize.name}</div>
                <p class="placeholder-text">點擊「開始抽獎」</p>
            `;
        }

        function startDraw() {
            if (!currentPrize || isDrawing) return;
            
            const winnersNeeded = currentPrize.winnersPerDraw;
            
            if (availableParticipants.length < winnersNeeded) {
                showNotification(`剩餘人數不足！需要 ${winnersNeeded} 人，剩餘 ${availableParticipants.length} 人`, 'error');
                return;
            }

            isDrawing = true;
            document.getElementById('drawBtn').disabled = true;
            document.getElementById('confirmBtn').disabled = true;

            const display = document.getElementById('winnerDisplay');
            display.innerHTML = `
                <div class="current-prize-name">${currentPrize.name}</div>
                <div class="rolling">抽獎中...</div>
            `;

            let counter = 0;
            const rollInterval = setInterval(() => {
                const randomPerson = availableParticipants[Math.floor(Math.random() * availableParticipants.length)];
                display.innerHTML = `
                    <div class="current-prize-name">${currentPrize.name}</div>
                    <div class="rolling">${randomPerson}</div>
                `;
                counter++;

                if (counter > 25) {
                    clearInterval(rollInterval);
                    announceWinner();
                }
            }, 100);
        }

        function announceWinner() {
            const winnersNeeded = currentPrize.winnersPerDraw;
            
            // 隨機抽取指定數量的中獎者
            const shuffled = [...availableParticipants].sort(() => Math.random() - 0.5);
            currentWinner = shuffled.slice(0, winnersNeeded);
            
            const display = document.getElementById('winnerDisplay');
            
            if (winnersNeeded === 1) {
                // 單一中獎者
                display.innerHTML = `
                    <div class="current-prize-name">${currentPrize.name}</div>
                    <div style="margin-bottom: 20px; color: var(--neon-cyan); font-size: 1.5rem;">🎉 恭喜 🎉</div>
                    <div class="winner">${currentWinner[0]}</div>
                    <div style="margin-top: 20px; color: var(--neon-pink); font-size: 1.2rem;">中獎啦！</div>
                `;
            } else {
                // 多位中獎者
                const winnersHTML = currentWinner.map((name, i) => `
                    <div style="font-size: 2rem; font-weight: 900; color: var(--neon-yellow); margin: 8px 0; text-shadow: 0 0 20px var(--neon-yellow);">
                        ${i + 1}. ${name}
                    </div>
                `).join('');
                
                display.innerHTML = `
                    <div class="current-prize-name">${currentPrize.name}</div>
                    <div style="margin-bottom: 15px; color: var(--neon-cyan); font-size: 1.3rem;">🎉 恭喜以下 ${winnersNeeded} 位得獎者 🎉</div>
                    ${winnersHTML}
                `;
            }

            createConfetti();
            
            document.getElementById('confirmBtn').disabled = false;
            document.getElementById('drawBtn').disabled = false;
            isDrawing = false;
        }

        function confirmWinner() {
            if (!currentWinner || !currentPrize) return;

            // currentWinner 現在可能是陣列（多位中獎者）或單一字串
            const winners = Array.isArray(currentWinner) ? currentWinner : [currentWinner];
            
            // 從可用名單中移除所有中獎者
            winners.forEach(winner => {
                availableParticipants = availableParticipants.filter(p => p !== winner);
                
                // 記錄中獎者
                allWinners.push({
                    name: winner,
                    prize: currentPrize.name,
                    prizeId: currentPrize.id
                });
                
                prizeProgress[currentPrize.id].winners.push(winner);
            });

            prizeProgress[currentPrize.id].drawn += winners.length;

            updateStats();
            renderPrizeList();
            renderWinnerHistory();
            
            // 檢查是否還有剩餘數量
            const progress = prizeProgress[currentPrize.id];
            if (progress.drawn >= currentPrize.totalWinners) {
                showNotification(`${currentPrize.name} 已全部抽完！`, 'success');
                currentPrize = null;
                document.getElementById('drawBtn').disabled = true;
                document.getElementById('confirmBtn').disabled = true;
                document.getElementById('winnerDisplay').innerHTML = '<p class="placeholder-text">請選擇下一個獎品</p>';
            } else {
                // 準備下一次抽獎
                currentWinner = null;
                document.getElementById('confirmBtn').disabled = true;
                document.getElementById('winnerDisplay').innerHTML = `
                    <div class="current-prize-name">${currentPrize.name}</div>
                    <p class="placeholder-text">點擊「開始抽獎」繼續</p>
                `;
            }

            showNotification(`已確認 ${winners.length} 位中獎者！`, 'success');
        }

        function updateStats() {
            document.getElementById('totalParticipants').textContent = ALL_PARTICIPANTS.length;
            document.getElementById('remainingParticipants').textContent = availableParticipants.length;
            
            const completed = Object.values(prizeProgress).filter(p => {
                const prize = PRIZES.find(pr => pr.id === parseInt(Object.keys(prizeProgress).find(key => prizeProgress[key] === p)));
                return prize && p.drawn >= prize.totalWinners;
            }).length;
            document.getElementById('completedPrizes').textContent = `${completed}/${PRIZES.length}`;
        }

        function renderWinnerHistory() {
            const historyDiv = document.getElementById('winnerHistory');
            
            if (allWinners.length === 0) {
                historyDiv.innerHTML = '<p class="placeholder-text">尚無中獎記錄</p>';
                return;
            }

            const grouped = {};
            allWinners.forEach(w => {
                if (!grouped[w.prize]) grouped[w.prize] = [];
                grouped[w.prize].push(w.name);
            });

            const html = Object.entries(grouped).map(([prize, winners]) => `
                <div class="winner-group">
                    <div class="winner-group-title">${prize}</div>
                    ${winners.map((name, i) => `
                        <div class="winner-item">
                            <span class="winner-name">${name}</span>
                            <span class="winner-number">#${i + 1}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            historyDiv.innerHTML = html;
        }

        function createConfetti() {
            const colors = ['#ff0080', '#00ffff', '#b400ff', '#ffff00', '#ff6600'];
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animation = `confettiFall ${2 + Math.random() * 2}s linear`;
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 4000);
                }, i * 20);
            }
        }

        function resetAll() {
            if (!confirm('確定要重置所有抽獎記錄嗎？此操作無法復原！')) return;
            
            availableParticipants = [...ALL_PARTICIPANTS];
            allWinners = [];
            currentPrize = null;
            currentWinner = null;
            
            PRIZES.forEach(prize => {
                prizeProgress[prize.id] = {
                    drawn: 0,
                    winners: []
                };
            });

            renderPrizeList();
            updateStats();
            renderWinnerHistory();
            
            document.getElementById('drawBtn').disabled = true;
            document.getElementById('confirmBtn').disabled = true;
            document.getElementById('winnerDisplay').innerHTML = '<p class="placeholder-text">請選擇左側獎品開始抽獎</p>';
            
            showNotification('已重置所有抽獎記錄', 'success');
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? 'rgba(0, 255, 0, 0.2)' : 'rgba(255, 0, 0, 0.2)'};
                border: 2px solid ${type === 'success' ? '#00ff00' : '#ff0000'};
                color: #fff;
                padding: 15px 25px;
                border-radius: 10px;
                z-index: 10000;
                font-weight: 700;
                box-shadow: 0 0 20px ${type === 'success' ? 'rgba(0, 255, 0, 0.5)' : 'rgba(255, 0, 0, 0.5)'};
            `;
            document.body.appendChild(notification);

            setTimeout(() => notification.remove(), 3000);
        }

        // 初始化系統
        init();

        // 名單彈出視窗功能
        let currentFilter = 'all';

        function showParticipantList() {
            currentFilter = 'all';
            updateNameGrid();
            document.getElementById('participantModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeParticipantList() {
            document.getElementById('participantModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function filterList(type) {
            currentFilter = type;
            
            // 更新按鈕樣式
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateNameGrid();
        }

        function updateNameGrid() {
            const wonNames = new Set(allWinners.map(w => w.name));
            let displayList = [];
            
            switch(currentFilter) {
                case 'all':
                    displayList = ALL_PARTICIPANTS;
                    break;
                case 'available':
                    displayList = availableParticipants;
                    break;
                case 'won':
                    displayList = ALL_PARTICIPANTS.filter(name => wonNames.has(name));
                    break;
                case 'audience':
                    displayList = ALL_PARTICIPANTS.filter(name => name.startsWith('觀眾'));
                    break;
                case 'named':
                    displayList = ALL_PARTICIPANTS.filter(name => !name.startsWith('觀眾'));
                    break;
            }
            
            const grid = document.getElementById('nameGrid');
            grid.innerHTML = displayList.map(name => {
                const isWon = wonNames.has(name);
                return `<div class="name-item ${isWon ? 'won' : ''}">${name}</div>`;
            }).join('');
            
            // 更新計數
            document.getElementById('countAll').textContent = ALL_PARTICIPANTS.length;
            document.getElementById('countAvailable').textContent = availableParticipants.length;
            document.getElementById('countWon').textContent = allWinners.length;
            document.getElementById('countAudience').textContent = AUDIENCE.length;
            document.getElementById('countNamed').textContent = NAMED_PARTICIPANTS.length;
        }

        // 點擊視窗外部關閉
        window.onclick = function(event) {
            const modal = document.getElementById('participantModal');
            if (event.target === modal) {
                closeParticipantList();
            }
        }
    </script>
</body>
</html>
